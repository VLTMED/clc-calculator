name: Build, Deploy & Export HTML

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write   # needed to create GitHub Releases
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:

  # ══════════════════════════════════════════════════════
  # JOB 1: Build Vite app
  # ══════════════════════════════════════════════════════
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite app
        run: npm run build

      - name: Copy fonts into dist
        run: |
          mkdir -p dist/fonts
          cp public/fonts/*.ttf dist/fonts/

      - name: Write fonts.css into dist
        run: |
          cat > dist/fonts.css << 'CSSEOF'
          @font-face { font-family:'ThmanyahSans'; src:url('/clc-calculator/fonts/thmanyahsans-Light.ttf') format('truetype'); font-weight:300; font-display:block; }
          @font-face { font-family:'ThmanyahSans'; src:url('/clc-calculator/fonts/thmanyahsans-Regular.ttf') format('truetype'); font-weight:400; font-display:block; }
          @font-face { font-family:'ThmanyahSans'; src:url('/clc-calculator/fonts/thmanyahsans-Medium.ttf') format('truetype'); font-weight:500; font-display:block; }
          @font-face { font-family:'ThmanyahSans'; src:url('/clc-calculator/fonts/thmanyahsans-Bold.ttf') format('truetype'); font-weight:700; font-display:block; }
          @font-face { font-family:'ThmanyahSans'; src:url('/clc-calculator/fonts/thmanyahsans-Black.ttf') format('truetype'); font-weight:900; font-display:block; }
          @font-face { font-family:'ThmanyahSerifDisplay'; src:url('/clc-calculator/fonts/thmanyahserifdisplay-Bold.ttf') format('truetype'); font-weight:700; font-display:block; }
          @font-face { font-family:'ThmanyahSerifDisplay'; src:url('/clc-calculator/fonts/thmanyahserifdisplay-Black.ttf') format('truetype'); font-weight:900; font-display:block; }
          *,*::before,*::after{font-family:'ThmanyahSans',sans-serif!important}
          html,body{font-family:'ThmanyahSans'!important;font-weight:400;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;word-spacing:.04em;line-height:1.65}
          h1{font-family:'ThmanyahSerifDisplay'!important;font-weight:900!important;line-height:1.1!important;letter-spacing:-.025em!important}
          h2{font-family:'ThmanyahSerifDisplay'!important;font-weight:700!important;line-height:1.2!important;letter-spacing:-.015em!important}
          h3{font-family:'ThmanyahSans'!important;font-weight:700!important;line-height:1.3!important}
          h4,h5,h6{font-family:'ThmanyahSans'!important;font-weight:500!important}
          label{font-family:'ThmanyahSans'!important;font-weight:500!important}
          button{font-family:'ThmanyahSans'!important;font-weight:700!important}
          input,select,textarea{font-family:'ThmanyahSans'!important;font-weight:400!important}
          input::placeholder,textarea::placeholder{font-family:'ThmanyahSans'!important;font-weight:300!important}
          th{font-family:'ThmanyahSans'!important;font-weight:700!important}
          td{font-family:'ThmanyahSans'!important;font-weight:400!important}
          .font-sans{font-family:'ThmanyahSans'!important}
          .font-display{font-family:'ThmanyahSerifDisplay'!important}
          .font-mono{font-family:'ThmanyahSans'!important}
          .font-light{font-weight:300!important}
          .font-normal{font-weight:400!important}
          .font-medium{font-weight:500!important}
          .font-semibold{font-weight:700!important}
          .font-bold{font-weight:700!important}
          .font-black{font-weight:900!important}
          input[type="number"]{direction:ltr;text-align:end}
          CSSEOF

      - name: Inject fonts.css into dist/index.html
        run: |
          python3 - << 'PYEOF'
          with open('dist/index.html', 'r') as f:
              html = f.read()
          link = '<link rel="stylesheet" href="/clc-calculator/fonts.css">'
          html = html.replace('<head>', '<head>\n    ' + link, 1)
          with open('dist/index.html', 'w') as f:
              f.write(html)
          PYEOF

      # ── Generate standalone single-file HTML (fonts embedded as base64) ──
      - name: Generate standalone HTML with embedded fonts
        run: |
          python3 - << 'PYEOF'
          import base64, os

          with open('dist/assets/index-BMZu_54u.css') as f: css = f.read()

          # Find the JS file dynamically
          js_file = [f for f in os.listdir('dist/assets') if f.endswith('.js')][0]
          with open(f'dist/assets/{js_file}') as f: js = f.read()

          fonts = [
            ('ThmanyahSans',        300, 'thmanyahsans-Light.ttf'),
            ('ThmanyahSans',        400, 'thmanyahsans-Regular.ttf'),
            ('ThmanyahSans',        500, 'thmanyahsans-Medium.ttf'),
            ('ThmanyahSans',        700, 'thmanyahsans-Bold.ttf'),
            ('ThmanyahSans',        900, 'thmanyahsans-Black.ttf'),
            ('ThmanyahSerifDisplay',700, 'thmanyahserifdisplay-Bold.ttf'),
            ('ThmanyahSerifDisplay',900, 'thmanyahserifdisplay-Black.ttf'),
          ]

          font_faces = []
          for family, weight, filename in fonts:
            with open(f'dist/fonts/{filename}', 'rb') as f:
              b64 = base64.b64encode(f.read()).decode()
            font_faces.append(
              f"@font-face{{font-family:'{family}';"
              f"src:url('data:font/truetype;base64,{b64}') format('truetype');"
              f"font-weight:{weight};font-display:block;}}"
            )
            print(f'  embedded: {filename}')

          font_css = '\n'.join(font_faces)
          global_css = """
          *,*::before,*::after{font-family:'ThmanyahSans',sans-serif!important}
          html,body{font-family:'ThmanyahSans'!important;font-weight:400;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;word-spacing:.04em;line-height:1.65}
          h1{font-family:'ThmanyahSerifDisplay'!important;font-weight:900!important;line-height:1.1!important;letter-spacing:-.025em!important}
          h2{font-family:'ThmanyahSerifDisplay'!important;font-weight:700!important;line-height:1.2!important;letter-spacing:-.015em!important}
          h3{font-family:'ThmanyahSans'!important;font-weight:700!important;line-height:1.3!important}
          h4,h5,h6{font-family:'ThmanyahSans'!important;font-weight:500!important}
          label{font-family:'ThmanyahSans'!important;font-weight:500!important}
          button{font-family:'ThmanyahSans'!important;font-weight:700!important}
          input,select,textarea{font-family:'ThmanyahSans'!important;font-weight:400!important}
          input::placeholder,textarea::placeholder{font-family:'ThmanyahSans'!important;font-weight:300!important}
          th{font-family:'ThmanyahSans'!important;font-weight:700!important}
          td{font-family:'ThmanyahSans'!important;font-weight:400!important}
          .font-sans{font-family:'ThmanyahSans'!important}
          .font-display{font-family:'ThmanyahSerifDisplay'!important}
          .font-mono{font-family:'ThmanyahSans'!important}
          .font-light{font-weight:300!important}.font-normal{font-weight:400!important}
          .font-medium{font-weight:500!important}.font-semibold{font-weight:700!important}
          .font-bold{font-weight:700!important}.font-black{font-weight:900!important}
          input[type="number"]{direction:ltr;text-align:end}
          """

          html = f"""<!doctype html>
          <html lang="ar" dir="rtl">
          <head>
            <meta charset="UTF-8"/>
            <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
            <title>حساب أحمال التبريد والتكييف</title>
            <style>{font_css}{global_css}</style>
            <style>{css}</style>
          </head>
          <body>
            <div id="root"></div>
            <script type="module">{js}</script>
          </body>
          </html>"""

          with open('clc-calculator.html', 'w', encoding='utf-8') as f:
            f.write(html)

          size = os.path.getsize('clc-calculator.html') / (1024*1024)
          print(f'✅ clc-calculator.html — {size:.2f} MB')
          PYEOF

      - name: Create ZIP with standalone HTML
        run: |
          zip clc-calculator.zip clc-calculator.html
          echo "ZIP size: $(du -sh clc-calculator.zip | cut -f1)"

      # ── Upload ZIP as GitHub Release (tagged with commit SHA) ──
      - name: Create GitHub Release with ZIP
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.sha }}
          name: "Build — ${{ github.event.head_commit.message }}"
          body: |
            ## 📦 ملف HTML مستقل

            افتح `clc-calculator.html` مباشرة من أي مكان بدون إنترنت.

            - ✅ كل CSS مدمج
            - ✅ كل JavaScript مدمج
            - ✅ خطوط ثمانية (7 أوزان) مدمجة كـ base64
            - 🔗 الموقع المباشر: https://vltmed.github.io/clc-calculator/

            **Commit:** `${{ github.sha }}`
          files: clc-calculator.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Deploy to GitHub Pages ──
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  # ══════════════════════════════════════════════════════
  # JOB 2: Deploy Pages (needs build job)
  # ══════════════════════════════════════════════════════
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
